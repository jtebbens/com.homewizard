<script>
$(document).ready(function() {
  Homey.emit('get_kakusensors');
  
  Homey.on('kakusensor_list', function(sensorList) {
    $('#sensor_select').html('');
    
    var defaultOption = $('<option></option>')
      .text(Homey.__("settings.select_sensor"));
    $('#sensor_select').append(defaultOption);
    
    if (!sensorList || sensorList.length === 0) {
      $('#error').text(Homey.__("settings.no_sensors_found") || "No sensors found. Make sure your HomeWizard is polling data.");
      console.log('No kakusensors found');
      return;
    }
    
    $.each(sensorList, function(i, sensor) {
      var option = $('<option></option>')
        .attr('value', sensor.id)
        .attr('data-homewizard-id', sensor.homewizard_id)
        .attr('data-sensor-type', sensor.type)
        .text(sensor.name);
      $('#sensor_select').append(option);
    });
  });
});

function saveSettings() {
  $('#error').text('');
  $('#save').attr('disabled', true);
  
  var selectedOption = $('#sensor_select option:selected');
  
  if (!selectedOption || $('#sensor_select').prop('selectedIndex') === 0) {
    $('#error').text(Homey.__("settings.select_sensor") || "Please select a sensor");
    $('#save').attr('disabled', false);
    return;
  }
  
  var sensorId = selectedOption.val();
  var sensorName = selectedOption.text();
  var homewizardId = selectedOption.attr('data-homewizard-id');
  var sensorType = selectedOption.attr('data-sensor-type');
  
  var device = {
    data: {
      id: 'HW_KS' + Math.floor(Date.now() / 1000)
    },
    settings: {
      'homewizard_id': homewizardId,
      'kakusensors_id': sensorId,
      'kakusensor_type': sensorType
    },
    name: sensorName
  };
  
  Homey.emit('manual_add', device, function(err) {
    if (err) {
      $('#error').text(Homey.__("settings.error") + (err.message || err));
      $('#save').attr('disabled', false);
      return;
    }
  });
  
  Homey.on('success', function(device) {
    Homey.addDevice(device, function(err, result) {
      if (err) return Homey.alert(err);
      Homey.done();
    });
  });
  
  Homey.on('error', function(err) {
    $('#error').text(Homey.__("settings.error") + (err.message || err));
    $('#save').attr('disabled', false);
  });
}
</script>
<!doctype html>
<html>
    <head>
        <style>
            label {
                font-size: 16px;
                margin-bottom: 5px;
                display: block;
            }
            .field.row {
                margin-bottom: 20px;
            }
            #error {
                color: red;
                font-size: 16px;
            }
        </style>
    </head>
    <body>
        <p data-i18n="settings.sensor_intro"></p>
        <div class="field row">
            <select class="homey-form-select" id="sensor_select">
                <option data-i18n="settings.select_sensor"></option>
            </select>
        </div>
        <br>
        <p id="error"></p>
        <button class="homey-button-primary-full" onclick="saveSettings()" id="save" data-i18n="settings.save"></button>
    </body>
</html>
