<script>
async function saveSettings() {
  const errorEl = document.getElementById('error');
  const saveBtn = document.getElementById('save');
  
  errorEl.textContent = '';
  saveBtn.disabled = true;
  
  const ipInput = document.getElementById('homewizard_ip');
  const passInput = document.getElementById('homewizard_pass');
  const ledringCheckbox = document.getElementById('homewizard_ledring');
  
  if (!ipInput.value) {
    errorEl.textContent = Homey.__("settings.no_ip");
    saveBtn.disabled = false;
    return;
  }
  
  try {
    const device = await Homey.emit('manual_add', {
      data: { id: 'HW' + Math.floor(Date.now() / 1000) },
      settings: {
        'homewizard_ip': ipInput.value,
        'homewizard_pass': passInput.value,
        'homewizard_ledring': ledringCheckbox.checked
      },
      name: 'HomeWizard'
    });
    
    errorEl.textContent = 'Connected, saving...';
    
    await Homey.createDevice({
      data: {
        id: device.data.id
      },
      settings: device.settings,
      name: device.name,
      capabilities: []
    });
    
    await Homey.done();
  } catch (err) {
    console.error('[PAIRING] Error:', err);
    errorEl.textContent = 'Error: ' + (err.message || err);
    saveBtn.disabled = false;
  }
}

Homey.ready();
</script>
<!doctype html>
<html>
    <head>
        <style>
            select {
            font-size: 18px;
            padding: 10px;
            width: 100%;
            margin-bottom: 15px;
            height: 50px;
            box-sizing: border-box;
            }

            label {
            font-size: 16px;
            margin-bottom: 5px;
            display: block;
            }

            .field.row {
            margin-bottom: 20px;
            }

            #error {
            color: red;
            font-size: 16px;
            }
        </style>
    </head>
    <body>
        <p data-i18n="settings.intro"></p>
            <div class="field row">
                <label for="homewizard_ip" class="homey-form-label">HomeWizard's IP</label>
                <input id="homewizard_ip" class="homey-form-input" type="text" value="" />
            </div>
            <div class="field row">
                <label for="homewizard_pass" class="homey-form-label" data-i18n="settings.password"></label>
                <input id="homewizard_pass" class="homey-form-input" type="password" value="" />
            </div>
            <br>
            <div class="field row">
                <label for="homewizard_ledring" data-i18n="settings.use_ledring"></label>
                <input type="checkbox" id="homewizard_ledring" /><br><br><em data-i18n="settings.use_ledring_explain"></em>
            </div>
            <br>
            <p id="error"></p>
        <button class="homey-button-primary-full" onclick="saveSettings()" id="save" data-i18n="settings.save"></button>
    </body>
</html>
