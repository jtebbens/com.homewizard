<script>
$(document).ready(function() {
  Homey.emit('get_heatlinks');
  
  Homey.on('heatlink_list', function(heatLinkList) {
    $('#homewizard_select').html('');
    
    var defaultOption = $('<option></option>')
      .text(Homey.__("settings.select"));
    $('#homewizard_select').append(defaultOption);
    
    if (!heatLinkList || heatLinkList.length === 0) {
      $('#error').text(Homey.__("settings.no_heatlink_found") || "No HomeWizard units with HeatLink found. Make sure your HomeWizard is polling data.");
      console.log('No HeatLinks found in polldata');
      return;
    }
    
    $.each(heatLinkList, function(i, item) {
      var option = $('<option></option>')
        .attr('value', item.homewizard_id)
        .text((item.ip || item.name) + ' - ' + item.heatlink_name);
      $('#homewizard_select').append(option);
    });
  });
});

function saveSettings() {
  var homewizardId = $('#homewizard_select').val();
  
  $('#error').text('');
  $('#save').attr('disabled', true);
  
  if (!homewizardId || homewizardId === '' || $('#homewizard_select').prop('selectedIndex') === 0) {
    $('#error').text(Homey.__("settings.select_homewizard") || "Please select a HomeWizard");
    $('#save').attr('disabled', false);
    return;
  }
  
  var device = {
    data: {
      id: 'HW_HL' + Math.floor(Date.now() / 1000)
    },
    settings: {
      'homewizard_id': homewizardId
    },
    name: 'Heatlink'
  };
  
  Homey.emit('manual_add', device, function(err) {
    if (err) {
      $('#error').text((Homey.__("settings.error") || "Error: ") + err);
      $('#save').attr('disabled', false);
      return;
    }
  });
  
  Homey.on('success', function(device) {
    Homey.addDevice(device, function(err, result) {
      if (err) return Homey.alert(err);
      Homey.done();
    });
  });
  
  Homey.on('error', function(err) {
    $('#error').text((Homey.__("settings.error") || "Error: ") + err);
    $('#save').attr('disabled', false);
  });
}
</script>
<!doctype html>
<html>
    <head>
        <style>
            #error {
                color: red;
            }
        </style>
    </head>
    <body>
        <p data-i18n="settings.heatlink_intro"></p>
            <div class="field row">
				<select class="homey-form-select" id="homewizard_select">
					<option data-i18n="settings.select"></option>
				</select>
            </div>
            <br>
            <p id="error"></p>
        <button class="homey-button-primary-full" onclick="saveSettings()" id="save" data-i18n="settings.save"></button>
    </body>
</html>
